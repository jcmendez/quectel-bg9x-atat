name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["", "defmt"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
        if: matrix.features == ''
      - run: cargo clippy --target thumbv6m-none-eabi --no-default-features --features "${{ matrix.features }}" -- -D warnings
      - run: cargo check --target thumbv6m-none-eabi --no-default-features --features "${{ matrix.features }}"

  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --no-default-features
